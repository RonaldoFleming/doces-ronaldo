<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doces Ronaldo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fdf8f2; color: #2d1f0e; }

  header { background: #7c3d0f; color: white; text-align: center; padding: 20px 16px 16px; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.5px; }
  header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  .tabs { display: flex; background: #5c2d09; overflow-x: auto; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; min-width: 110px; padding: 12px 8px; text-align: center; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .tab.active { color: white; border-bottom-color: #f59e0b; }

  .section { display: block; padding: 16px; max-width: 600px; margin: 0 auto; }

  .section-title { font-size: 18px; font-weight: 700; color: #7c3d0f; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #f59e0b; }

  .product { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-weight: 700; font-size: 15px; color: #2d1f0e; }
  .product-desc { font-size: 12px; color: #888; margin-top: 2px; }
  .product-price { font-size: 15px; font-weight: 700; color: #7c3d0f; margin-top: 6px; }
  .product-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #f0e8df; }

  .qty-control { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #7c3d0f; background: white; color: #7c3d0f; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.15s; }
  .qty-btn:active { background: #7c3d0f; color: white; }
  .qty-num { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; color: #2d1f0e; }

  .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: white; box-shadow: 0 -2px 12px rgba(0,0,0,0.12); display: none; }
  .cart-bar.visible { display: block; }
  .cart-btn { display: flex; justify-content: space-between; align-items: center; background: #25d366; color: white; border: none; border-radius: 12px; padding: 14px 20px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; }
  .cart-btn:active { background: #1da851; }
  .cart-btn span { font-size: 13px; opacity: 0.9; }

  .empty-cart { text-align: center; color: #aaa; padding: 40px 20px; font-size: 14px; }

  pb { padding-bottom: 8px; display: block; }
  .page-bottom { height: 80px; }
</style>
</head>
<body>

<header>
  <h1>🍬 Doces Ronaldo</h1>
  <p>Produtos artesanais e de qualidade</p>
</header>

<div class="tabs">
  <div class="tab active" id="tab-doces" onclick="scrollToSection('doces')">Doces</div>
  <div class="tab" id="tab-amendoins" onclick="scrollToSection('amendoins')">Amendoins/Queijos</div>
  <div class="tab" id="tab-bolos" onclick="scrollToSection('bolos')">Bolos/Broas</div>
</div>

<div id="doces" class="section">
  <pb></pb>
  <p class="section-title">Doces</p>
  <div id="list-doces"></div>
</div>

<div id="amendoins" class="section">
  <pb></pb>
  <p class="section-title">Amendoins / Queijos</p>
  <div id="list-amendoins"></div>
</div>

<div id="bolos" class="section">
  <pb></pb>
  <p class="section-title">Bolos / Broas</p>
  <div id="list-bolos"></div>
</div>
<div class="page-bottom"></div>

<div class="cart-bar" id="cart-bar">
  <button class="cart-btn" onclick="sendWhatsApp()">
    <span id="cart-count">0 itens</span>
    <span>Pedir pelo WhatsApp →</span>
    <span id="cart-total">R$ 0,00</span>
  </button>
</div>

<script>
const WHATSAPP = '5511984169999';

const products = {
  doces: [
    { id: 'd1',  name: 'Paçocão no Espeto',         desc: 'Espeto c/50 unidades de 90g cada',            price: 90,  img: 'pacocao-no-espeto' },
    { id: 'd2',  name: 'Paçoca',                     desc: 'Pote c/20 unidades de 73g cada',              price: 34,  img: 'pacoca' },
    { id: 'd3',  name: 'Pé de Moça',                 desc: 'Pote c/20 unidades de 51g cada',              price: 26,  img: 'pe-de-moca' },
    { id: 'd4',  name: 'Pé de Moleque',              desc: 'Pote c/20 unidades de 52g cada',              price: 25,  img: 'pe-de-moleque' },
    { id: 'd5',  name: 'Paçoca Rolha',               desc: 'Pote c/20 unidades de 55g cada',              price: 25,  img: 'pacoca-rolha' },
    { id: 'd6',  name: 'Cocada',                     desc: 'Pote c/20 unidades de 50g cada',              price: 40,  img: 'cocada' },
    { id: 'd7',  name: 'Cocada Comprida',            desc: 'Pote c/20 unidades de 50g cada',              price: 36,  img: 'cocada-comprida' },
    { id: 'd8',  name: 'Quebra-Queixo',              desc: 'Pote c/20 unidades de 51g cada',              price: 32,  img: 'quebra-queixo' },
    { id: 'd9',  name: 'AB - Abóbora/Batata',        desc: 'Pote c/16 unidades de 65g cada',              price: 22,  img: 'ab-aboborabatata' },
    { id: 'd10', name: 'Doce de Leite Misto',        desc: 'Pote c/20 unidades de 55g cada',              price: 46,  img: 'doce-de-leite-misto' },
    { id: 'd11', name: 'Doce de Leite Puro',         desc: 'Pote c/20 unidades de 55g cada',              price: 46,  img: 'doce-de-leite-puro' },
    { id: 'd12', name: 'Doce de Leite com Coco',     desc: 'Pote c/20 unidades de 55g cada',              price: 46,  img: 'doce-de-leite-com-coco' },
    { id: 'd13', name: 'Amendoleite',                desc: 'Pote c/20 unidades de 65g cada',              price: 32,  img: 'amendoleite' },
    { id: 'd14', name: 'Pingo de Leite',             desc: 'Display c/40 unidades de 20g cada',           price: 50,  img: 'pingo-de-leite-maior-e-melhor' },
    { id: 'd15', name: 'Bananinha Famoso',           desc: 'Display c/24 unidades de 30g cada',           price: 42,  img: 'bananinha-famoso' },
    { id: 'd16', name: 'Bananinha Famoso Diet',      desc: 'Display c/24 unidades de 30g cada',           price: 52,  img: 'bananinha-famoso-diet' },
    { id: 'd17', name: 'Bananinha Palito',           desc: 'Pote c/30 unidades de 35g cada',              price: 38,  img: 'bananinha-palito' },
    { id: 'd18', name: 'Bala Quebra-Queixo',         desc: 'Pote de 600g c/100 unidades',                 price: 20,  img: 'bala-quebra-queixo' },
    { id: 'd19', name: 'Paçoquita',                  desc: 'Display c/50 unidades de 20g cada',           price: 37,  img: 'pacoquita' },
    { id: 'd20', name: 'Pingo Bel Ouro de Minas',   desc: 'Pote c/21 unidades de 50g cada',              price: 46,  img: 'pingo-bel-ouro-de-minas' },
    { id: 'd21', name: 'Brigadeiro Ouro de Minas',  desc: 'Pote c/21 unidades de 50g cada',              price: 46,  img: 'brigadeiro-ouro-de-minas' },
    { id: 'd22', name: 'Beijo Ouro de Minas',       desc: 'Pote c/21 unidades de 50g cada',              price: 46,  img: 'beijo-ouro-de-minas' },
    { id: 'd23', name: 'Palha Italiana Ouro de Minas', desc: 'Pote c/21 unidades de 50g cada',           price: 46,  img: 'palha-italiana-ouro-de-minas' },
    { id: 'd24', name: 'Beijo de Moça Ouro de Minas',  desc: 'Pote c/21 unidades de 50g cada',           price: 46,  img: 'beijo-de-moca-ouro-de-minas' },
  ],
  amendoins: [
    { id: 'a1', name: 'Amendoim Salgado c/Alho Sem Pele',    desc: 'Cartela c/10 pacotinhos de 90g cada',           price: 30, img: 'amendoim-salgado-calho-sem-pele' },
    { id: 'a2', name: 'Amendoim Salgado c/Alho Com Pele',    desc: 'Cartela c/10 pacotinhos de 90g cada',           price: 30, img: 'amendoim-salgado-calho-com-pele' },
    { id: 'a3', name: 'Amendoim Salgado Sem Pele no Espeto', desc: 'Espeto c/40 pacotinhos de 50g cada',            price: 70, img: 'amendoim-salgado-sem-pele-no-espeto' },
    { id: 'a4', name: 'Amendoim Salgado Com Pele no Espeto', desc: 'Espeto c/40 pacotinhos de 50g cada',            price: 70, img: 'amendoim-salgado-com-pele-no-espeto' },
    { id: 'a5', name: 'Queijo Palito Temperado Mussarela',   desc: 'Espeto c/40 palitos embalados individualmente', price: 90, img: 'queijo-palito-temperado-mussarela' },
    { id: 'a6', name: 'Queijo Nó Mussarela',                 desc: 'Balde c/ 1,02 Kg',                              price: 98, img: 'queijo-no-mussarela' },
    { id: 'a7', name: 'Queijo Trança Mussarela',             desc: 'Peso Bruto 2,5 Kg',                             price: 98, img: 'queijo-tranca-mussarela' },
    { id: 'a8', name: 'Queijo Parmesão',                     desc: 'Peso Bruto 1,9 Kg',                             price: 98, img: 'queijo-parmesao' },
  ],
  bolos: [
    { id: 'b1',  name: 'Broas de Milho',            desc: 'Bandeja c/12 unidades', price: 35, img: 'broas-de-milho' },
    { id: 'b2',  name: 'Bolo Aipim',                desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-aipim' },
    { id: 'b3',  name: 'Bolo Milho Verde',          desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-milho-verde' },
    { id: 'b4',  name: 'Bolo Laranja',              desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-laranja' },
    { id: 'b5',  name: 'Bolo Cenoura c/Chocolate',  desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-cenoura-c-chocolate' },
    { id: 'b6',  name: 'Bolo Frapê',                desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-frape' },
    { id: 'b7',  name: 'Bolo Chocolate',            desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-chocolate' },
    { id: 'b8',  name: 'Bolo Leite Condensado',     desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-leite-condensado' },
    { id: 'b9',  name: 'Bolo Coco',                 desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-coco' },
    { id: 'b10', name: 'Bolo Abacaxi',              desc: 'Bolo c/12 fatias',      price: 35, img: 'bolo-abacaxi' },
  ]
};

const cart = {};

function fmt(n) {
  return 'R$ ' + n.toFixed(2).replace('.', ',');
}

function renderList(category) {
  const container = document.getElementById('list-' + category);
  container.innerHTML = '';
  products[category].forEach(p => {
    const div = document.createElement('div');
    div.className = 'product';
    div.innerHTML = `
      ${p.img ? `<img class="product-img" src="images/${p.img}.webp" alt="${p.name}" loading="lazy">` : ''}
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-price">${fmt(p.price)}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
        <span class="qty-num" id="qty-${p.id}">0</span>
        <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function findProduct(id) {
  for (const cat of Object.values(products)) {
    const p = cat.find(x => x.id === id);
    if (p) return p;
  }
}

function changeQty(id, delta) {
  const current = cart[id] || 0;
  const next = Math.max(0, current + delta);
  if (next === 0) delete cart[id];
  else cart[id] = next;
  document.getElementById('qty-' + id).textContent = next;
  updateCartBar();
}

function updateCartBar() {
  const ids = Object.keys(cart);
  const totalItems = ids.reduce((s, id) => s + cart[id], 0);
  const totalPrice = ids.reduce((s, id) => s + cart[id] * findProduct(id).price, 0);
  const bar = document.getElementById('cart-bar');
  if (totalItems === 0) {
    bar.classList.remove('visible');
  } else {
    bar.classList.add('visible');
    document.getElementById('cart-count').textContent = totalItems + (totalItems === 1 ? ' item' : ' itens');
    document.getElementById('cart-total').textContent = fmt(totalPrice);
  }
}

function sendWhatsApp() {
  const ids = Object.keys(cart);
  if (ids.length === 0) return;
  const totalPrice = ids.reduce((s, id) => s + cart[id] * findProduct(id).price, 0);
  let msg = '🛍️ *Pedido - Doces Ronaldo*\n\n';
  ids.forEach(id => {
    const p = findProduct(id);
    const subtotal = cart[id] * p.price;
    msg += `• ${cart[id]}x ${p.name} — ${fmt(subtotal)}\n`;
  });
  msg += `\n*Total: ${fmt(totalPrice)}*`;
  const url = 'https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  const offset = el.getBoundingClientRect().top + window.scrollY - 48;
  window.scrollTo({ top: offset, behavior: 'smooth' });
}

const sections = ['doces', 'amendoins', 'bolos'];
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      sections.forEach(s => document.getElementById('tab-' + s).classList.remove('active'));
      document.getElementById('tab-' + entry.target.id).classList.add('active');
    }
  });
}, { rootMargin: '-48px 0px -60% 0px', threshold: 0 });

renderList('doces');
renderList('amendoins');
renderList('bolos');

sections.forEach(s => observer.observe(document.getElementById(s)));
</script>
</body>
</html>
